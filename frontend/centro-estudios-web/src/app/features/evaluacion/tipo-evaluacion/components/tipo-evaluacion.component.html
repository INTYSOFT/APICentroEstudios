<section class="page">
  <header class="page__header">
    <div>
      <h1>Tipo de Evaluación</h1>
      <p class="subtitle">
        Administra los tipos de evaluación disponibles. Usa el buscador para encontrar rápidamente un registro.
      </p>
    </div>
    <div class="actions">
      <button type="button" class="refresh" (click)="refresh()" [disabled]="loading()">
        Refrescar
      </button>
      <button type="button" class="primary" (click)="onCreate()" [disabled]="loading()">
        Nuevo tipo de evaluación
      </button>
    </div>
  </header>

  <div class="search">
    <label for="search" class="sr-only">Buscar tipo de evaluación</label>
    <input
      id="search"
      type="search"
      [formControl]="searchControl"
      placeholder="Buscar por nombre o descripción"
    />
  </div>

  <div class="status" *ngIf="loading() || errorMessage()">
    <span *ngIf="loading()">Cargando tipos de evaluación…</span>
    <span *ngIf="!loading() && errorMessage()" class="error">{{ errorMessage() }}</span>
  </div>

  <div class="grid-wrapper">
    <ag-grid-angular
      class="ag-theme-quartz"
      [rowData]="filteredTipoEvaluaciones()"
      [columnDefs]="columnDefs"
      [defaultColDef]="defaultColDef"
      rowSelection="single"
      (gridReady)="onGridReady($event)"
      (rowDoubleClicked)="onEditSelected($event.data)"
    ></ag-grid-angular>
  </div>
</section>
