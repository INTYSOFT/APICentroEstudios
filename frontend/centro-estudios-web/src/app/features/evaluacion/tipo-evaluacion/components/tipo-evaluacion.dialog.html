<div class="dialog-container">
  <h2>{{ title }}</h2>
  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="form-field">
      <label for="nombre">Nombre *</label>
      <input id="nombre" type="text" formControlName="nombre" placeholder="Nombre del tipo de evaluación" />
      <div class="error" *ngIf="form.controls.nombre.invalid && form.controls.nombre.touched">
        El nombre es obligatorio y debe tener máximo 150 caracteres.
      </div>
    </div>

    <div class="form-field">
      <label for="descripcion">Descripción</label>
      <textarea
        id="descripcion"
        rows="3"
        formControlName="descripcion"
        placeholder="Descripción breve"
      ></textarea>
      <div class="error" *ngIf="form.controls.descripcion.invalid && form.controls.descripcion.touched">
        La descripción debe tener máximo 250 caracteres.
      </div>
    </div>

    <div class="form-field checkbox">
      <input id="activo" type="checkbox" formControlName="activo" />
      <label for="activo">Activo</label>
    </div>

    <div class="actions">
      <button type="button" class="secondary" (click)="onCancel()">Cancelar</button>
      <button type="submit" class="primary" [disabled]="form.invalid">{{ submitLabel }}</button>
    </div>
  </form>
</div>
